<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="main.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess Word</title>
</head>
<body>
    <h1>Guess The Word</h1>
    <div class="guess-game">
        <div class="game">
            <div class="inputs"></div>

            <div class="control">
                <button class="check">Check Word</button>
                <button class="hint"><span></span>Hint</button>

            </div>
            


        </div>
        <div class="tot">
            <h2>Key Color</h2>
            <div class="colors">
                <div class="color in-place"></div>
                <div class="key-text">Letter is Correct and in Place</div>

            </div>
            <div class="colors">
                <div class="color not-place"></div>
                <div class="key-text">Letter is Correct but in Wrong Place</div>

            </div>
            <div class="colors">
                <div class="color wrong"></div>
                <div class="key-text">Letter is Wrong</div>

            </div>
            <div class="mass"></div>
        </div>



    </div>
    <footer></footer>
    <script src="main.js"></script>
</body>
</html>
